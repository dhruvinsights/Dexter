    <title>Dexter - Orbital Visualization</title>

    <script src=" settings/settingsOverride.js"></script>

    <!-- Early SW update check: reload before the app bundle loads if a new version is waiting -->
    <script>
      if ('serviceWorker' in navigator && location.protocol === 'https:') {
        (function () {
          var hadController = !!navigator.serviceWorker.controller;

          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (hadController) {
              location.reload();
            }
          });

          navigator.serviceWorker.getRegistration().then(function (reg) {
            if (reg && reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        })();
      }
    </script>
  </head>

  <body>
    <div id="dexter-root" class="no-text-select" style="position: absolute; top: 0px; left: 0px; width: 100%; height: 100%; margin: 0; background: #000000;"></div>
  </body>
